<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue-traccking-part</title>

    <!-- font family  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--  deisy and taiwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <header>
        <div
            class="flex flex-col md:flex-row justify-between navbar bg-base-100 shadow-sm  px-[80px] py-[20px] text-center ">

            <div class=" flex1 flex flex-col md:flex-row items-center  justify-center gap-1">
                <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                    <div class="w-10 rounded-full">
                        <img alt="Tailwind CSS Navbar component" src="./assets/github-logo.png" />
                    </div>
                </div>

                <div class="">
                    <h2 class=" font-semibold text-[24px] ">GitHub Issues Tracker</h2>
                </div>
            </div>


            <!-- search part -->
            <div class="flex2  flex flex-col my-3 md:flex-row items-center justify-center gap-4">


                <div class="w-full md:w-auto">
                    <label class="  input text-[#64748B] ">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues.." class="rounded-sm " />
                    </label>
                </div>



                <!-- button -->
                <div class=""> <button class="  bg-[#4A00FF] px-5 py-2  text-white rounded-sm text-center"><span
                            class=""><i class="fa-solid fa-plus"></i>
                        </span>New Issue</button>

                </div>

            </div>

        </div>






    </header>





    <!-- main page part -->
    <section class=" md:px-[245px] md:py-[60px] ">
        <div class="flex flex-col    md:flex-row  justify-start  items-center p-6 shadow-md rounded-sm gap-3 mb-[18px]">
            <div class=" w-full md:w-auto "><button
                    class="w-full md:w-auto border border-gray-200 px-6 py-2  rounded-sm text-white shadow-sm  bg-[#4A00FF] nav-btn">
                    All</button></div>
            <div class=" w-full md:w-auto"><button
                    class=" w-full md:w-auto border border-gray-200 px-6 py-2  text-[#64748B] shadow-sm rounded-sm nav-btn">Open</button>
            </div>
            <div class=" w-full md:w-auto"><button
                    class="w-full md:w-auto border border-gray-200 px-6 py-2  text-[#64748B] shadow-sm rounded-sm nav-btn">
                    Closed</button>
            </div>

        </div>

        <!-- issue part  -->

        <div class="flex justify-between items-center p-6 shadow-md rounded-sm gap-3 ">


            <div
                class="flex flex-col md:flex-row justify-between items-center p-6 shadow-md rounded-sm w-full bg-white gap-6 md:gap-0">

                <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-left">
                    <div class="flex-shrink-0">
                        <img src="./assets/Aperture.png" alt="Aperture Icon" class="w-10 h-10">
                    </div>
                    <div>
                        <h2 id="issue-count" class="text-[20px] font-semibold  text-gray-800">0 Issues</h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div
                    class="flex items-center gap-4 md:gap-6 md:pt-4  w-full md:w-auto justify-center md:justify-end">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                        <h3 class="text-gray-700 font-medium capitalize text-sm md:text-base">open</h3>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                        <h3 class="text-gray-700 font-medium capitalize text-sm md:text-base">closed</h3>
                    </div>
                </div>
            </div>


            <!-- jjjj -->









        </div>
        <div class="p-6 shadow-md rounded-sm  ">
            <div id="issue-container1" class="issue-container"></div>
        </div>






    </section>



    <!-- modal part -->
    <dialog id="issue_modal" class="modal">
        <div class="modal-box">
            <div id="modal-content"></div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>






    <script src="main.js"></script>

</body>

</html>
